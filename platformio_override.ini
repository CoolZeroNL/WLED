# Example PlatformIO Project Configuration Override
# ------------------------------------------------------------------------------
# Copy to platformio_override.ini to activate overrides
# ------------------------------------------------------------------------------
# Please visit documentation: https://docs.platformio.org/page/projectconf.html

##################################
# debug enabled!

[platformio]
default_envs = esp32_eth, esp32_eth_mine

#==================================================================================================================#

[env:esp32_eth_mine]
extends = env:esp32_eth  # when you want to extend the existing environment (define only updated options)
; board = esp01_1m  # uncomment when ou need different board

build_unflags = ${common.build_unflags}

custom_usermods =
  ;; MyMod = https://github.com/wled/wled-usermod-example#main
  MyMod = https://github.com/CoolZeroNL/wled_usermod_data_to_influxdb.git#main
  
build_flags = ${common.build_flags} ${esp32.build_flags} -D WLED_RELEASE_NAME=\"ESP32_Ethernet_mine\" 
  -D WLED_DEBUG 
  
  ;; Configure and use Ethernet
  -D WLED_USE_ETHERNET
  
  ;; Define Ethernet board/adapter type: Serg74-ETH32
  -D WLED_ETH_DEFAULT=10
  -D PHY_ADDR=0 -D ETH_PHY_POWER=5 -D ETH_PHY_MDC=23 -D ETH_PHY_MDIO=18
  -D ETH_CLK_MODE=ETH_CLOCK_GPIO17_OUT
  
  ;; OTA
  ;; -D WLED_DISABLE_OTA 

  ;; wifi
  ;; -D CLIENT_SSID='"wifissid"' 
  ;; -D CLIENT_PASS='"wifipass"'

  ;; set milliampere limit when using ESP power pin (or inadequate PSU) to power LEDs
  -D ABL_MILLIAMPS_DEFAULT=30000
  -D LED_MILLIAMPS_DEFAULT=33

  ;; set the default LED type
  ;; see const.h (22 = TYPE_WS2812_RGB)
  -D LED_TYPES=22    
  
  ;; or this for multiple outputs
  ;   -D LED_TYPES=TYPE_SK6812_RGBW,TYPE_WS2812_RGB

  ; set default color order of your led strip (WS2811 = RGB)
  -D DEFAULT_LED_COLOR_ORDER=COL_ORDER_RGB

  ;; Led pins:
  -D DATA_PINS=2,4,16

  ;; Led pixel count
  ;; -D PIXEL_COUNTS=250
  
  ;; or this for multiple outputs
  -D PIXEL_COUNTS=250,250,250

  ;; set pins to unused  
  -D RLYPIN=-1
  -D BTNPIN=-1
  #  -D SR_DMTYPE=-1 
  #  -D AUDIOPIN=-1 
  #  -D I2S_SDPIN=-1 
  #  -D I2S_WSPIN=-1 
  #  -D I2S_CKPIN=-1 
  #  -D MCLK_PIN=-1 
  
  ;; enable
  ;; -D WLED_ENABLE_DMX
  ;; -D WLED_ENABLE_MQTT
  ;; -D WLED_ENABLE_WEBSOCKETS 

  ;; disable
  ;; ESP-NOW requires wifi, may crash with ethernet only -> uncomment if your board uses ETH_CLOCK_GPIO0_OUT, ETH_CLOCK_GPIO16_OUT, ETH_CLOCK_GPIO17_OUT
  -D WLED_DISABLE_ESPNOW     
  -D WLED_DISABLE_OTA
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_2D
  -D WLED_DISABLE_PIXELFORGE
  -D WLED_DISABLE_ESPNOW
  -D WLED_DISABLE_BROWNOUT_DET
;   -D WLED_DISABLE_WEBSOCKETS
;   -D WLED_DISABLE_MQTT
